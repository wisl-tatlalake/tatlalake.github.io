name: release-please

# Conventional-commit-driven releases. On each push to main, release-please
# maintains a "release PR" that bumps the version (in .release-please-manifest.json
# and _config.yml) and updates CHANGELOG.md from the commit messages. Merging that
# PR tags vX.Y.Z and publishes a GitHub Release; the resulting push to main also
# triggers the deploy workflow, so the new version goes live with the footer link.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
